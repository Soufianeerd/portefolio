<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Calculator | UI Design</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons for UI -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="calculator-container">
        <!-- Top Bar -->
        <header class="calc-header">
            <i class="fas fa-bars"></i>
            <div class="mode-switch">
                <span class="mode-item active">• Deg</span>
                <span class="mode-item">Rad</span>
            </div>
            <i class="far fa-moon"></i>
        </header>

        <!-- Display Area -->
        <div class="display">
            <div class="previous-op" id="previous-display">sin(30) × √2 + log₁₀(100)</div>
            <div class="current-op" id="current-display">1.70710678</div>
        </div>

        <!-- Buttons Section -->
        <div class="buttons-section">
            <!-- Scientific Grid (6 columns) -->
            <div class="scientific-grid">
                <button class="btn" onclick="mem('MC')">MC</button>
                <button class="btn" onclick="mem('MR')">MR</button>
                <button class="btn" onclick="mem('M+')">M+</button>
                <button class="btn" onclick="mem('M-')">M-</button>
                <button class="btn" onclick="mem('MS')">MS</button>
                <button class="btn ac" onclick="clearAll()">AC</button>
                
                <button class="btn" onclick="func('sin')">sin</button>
                <button class="btn" onclick="func('cos')">cos</button>
                <button class="btn" onclick="func('tan')">tan</button>
                <button class="btn" onclick="func('ln')">ln</button>
                <button class="btn" onclick="func('log')">log</button>
                <button class="btn" onclick="op('%')">%</button>
                
                <button class="btn" onclick="func('sqrt')">√</button>
                <button class="btn" onclick="func('pow2')">x²</button>
                <button class="btn" onclick="func('powy')">xʸ</button>
                <button class="btn" onclick="consts('pi')">π</button>
                <button class="btn" onclick="append('(')">(</button>
                <button class="btn" onclick="append(')')">)</button>
            </div>

            <!-- Main Grid (5 columns) -->
            <div class="main-grid">
                <button class="btn btn-num" onclick="append('7')">7</button>
                <button class="btn btn-num" onclick="append('8')">8</button>
                <button class="btn btn-num" onclick="append('9')">9</button>
                <button class="btn btn-op" onclick="op('/')">÷</button>
                <button class="btn btn-op" onclick="op('*')">×</button>
                
                <button class="btn btn-num" onclick="append('4')">4</button>
                <button class="btn btn-num" onclick="append('5')">5</button>
                <button class="btn btn-num" onclick="append('6')">6</button>
                <button class="btn btn-op" onclick="op('-')">−</button>
                <button class="btn btn-op" onclick="op('+')">+</button>
                
                <button class="btn btn-num" onclick="append('1')">1</button>
                <button class="btn btn-num" onclick="append('2')">2</button>
                <button class="btn btn-num" onclick="append('3')">3</button>
                <button class="btn btn-op" onclick="func('plusminus')">+/-</button>
                <button class="btn btn-equals" onclick="calculate()">=</button>
                
                <button class="btn btn-num" style="grid-column: span 2;" onclick="append('0')">0</button>
                <button class="btn btn-num" onclick="append('.')">.</button>
                <button class="btn btn-num" style="font-size: 11px;" onclick="func('exp')">EXP</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="../_shared/portfolio-bar.js" defer></script>
</body>
</html>
