<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container app-container">
        <div class="calculator">
            <div class="display">
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>
            <div class="buttons">
                <!-- Scientific Row 1 -->
                <button class="btn scientific" onclick="scientific('sin')">sin</button>
                <button class="btn scientific" onclick="scientific('cos')">cos</button>
                <button class="btn scientific" onclick="scientific('tan')">tan</button>
                <button class="btn scientific" onclick="scientific('log')">log</button>

                <!-- Scientific Row 2 -->
                <button class="btn scientific" onclick="scientific('sqrt')">√</button>
                <button class="btn scientific" onclick="scientific('pow2')">x²</button>
                <button class="btn scientific" onclick="scientific('pi')">π</button>
                <button class="btn scientific" onclick="scientific('e')">e</button>

                <!-- Standard Grid -->
                <button class="btn ac span-two" onclick="clearDisplay()">AC</button>
                <button class="btn" onclick="deleteNumber()">DEL</button>
                <button class="btn operator" onclick="chooseOperation('÷')">÷</button>

                <button class="btn" onclick="appendNumber('7')">7</button>
                <button class="btn" onclick="appendNumber('8')">8</button>
                <button class="btn" onclick="appendNumber('9')">9</button>
                <button class="btn operator" onclick="chooseOperation('×')">×</button>

                <button class="btn" onclick="appendNumber('4')">4</button>
                <button class="btn" onclick="appendNumber('5')">5</button>
                <button class="btn" onclick="appendNumber('6')">6</button>
                <button class="btn operator" onclick="chooseOperation('-')">-</button>

                <button class="btn" onclick="appendNumber('1')">1</button>
                <button class="btn" onclick="appendNumber('2')">2</button>
                <button class="btn" onclick="appendNumber('3')">3</button>
                <button class="btn operator" onclick="chooseOperation('+')">+</button>

                <button class="btn" onclick="appendNumber('.')">.</button>
                <button class="btn" onclick="appendNumber('0')">0</button>
                <button class="btn equals span-two" onclick="compute()">=</button>
            </div>
        </div>

        <div class="history-panel">
            <h3>History</h3>
            <div id="history-list" class="history-list">
                <!-- History items will appear here -->
                <div class="empty-history">No history yet</div>
            </div>
            <button class="btn-clear-history" onclick="clearHistory()">Clear History</button>
        </div>

    </div>
    <footer>
        <a href="../../index.html"
            style="color: rgba(255,255,255,0.6); text-decoration: none; font-family: 'Poppins', sans-serif;">&larr; Back
            to Portfolio</a>
    </footer>
    <script src="script.js"></script>
</body>

</html>
