<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master | Gestionnaire de tâches intelligent</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-check-double"></i>
            </div>
            
            <nav class="nav-list">
                <a href="#" class="nav-item active" data-filter="all">
                    <i class="fas fa-list-ul"></i>
                    <span>Tâches</span>
                </a>
                <a href="#" class="nav-item" data-filter="today">
                    <i class="far fa-calendar-check"></i>
                    <span>Aujourd'hui</span>
                    <span class="nav-count" id="count-today">8</span>
                </a>
                <a href="#" class="nav-item" data-filter="priorities">
                    <i class="far fa-flag"></i>
                    <span>Priorités</span>
                    <span class="nav-count" id="count-priorities">3</span>
                </a>
                <a href="#" class="nav-item" data-filter="completed">
                    <i class="far fa-check-circle"></i>
                    <span>Terminées</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Paramètres</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="dot green"></span>
                    <span>Stockage local</span>
                </div>
                <div class="status-indicator">
                    <span class="dot grey"></span>
                    <span>Synchro OK</span>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <header class="header-top">
                <h2 id="view-title">Mes tâches</h2>
                <div class="header-actions">
                    <button class="action-btn"><i class="fas fa-search"></i></button>
                    <button class="action-btn"><i class="fas fa-ellipsis-v"></i></button>
                </div>
            </header>

            <div class="filters-bar">
                <button class="filter-chip active" data-filter="all">Toutes</button>
                <button class="filter-chip" data-filter="today">
                    <i class="far fa-sun"></i> Aujourd'hui
                </button>
                <button class="filter-chip">
                    Priorité <i class="fas fa-chevron-down" style="font-size: 10px; margin-left: 4px;"></i>
                </button>
            </div>

            <!-- Task Groups -->
            <div id="task-groups-container">
                <section class="task-section">
                    <h3 class="section-title">Aujourd'hui</h3>
                    <div class="task-list" id="list-today">
                        <!-- Tasks go here -->
                    </div>
                </section>

                <section class="task-section">
                    <h3 class="section-title">À venir</h3>
                    <div class="task-list" id="list-upcoming">
                        <!-- Tasks go here -->
                    </div>
                </section>
            </div>

            <!-- Footer Stats -->
            <div style="margin-top: auto; display: flex; justify-content: space-between; align-items: center; padding-top: 24px; border-top: 1px solid var(--border-color); color: var(--text-muted); font-size: 12px; font-weight: 600;">
                <span id="remaining-count">4 tâches restantes</span>
                <span style="cursor: pointer;">Trier par priorité <i class="fas fa-chevron-down" style="font-size: 10px;"></i></span>
            </div>
        </main>

        <!-- Floating Action Button -->
        <button class="add-task-btn" id="open-modal">
            Organiser <i class="fas fa-arrow-right"></i>
        </button>
    </div>

    <!-- Add Task Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h3>Nouvelle tâche</h3>
            <input type="text" id="task-input" placeholder="Que voulez-vous accomplir ?">
            <select id="task-priority">
                <option value="low">Priorité Basse</option>
                <option value="medium" selected>Priorité Moyenne</option>
                <option value="high">Priorité Élevée</option>
            </select>
            <select id="task-date">
                <option value="today">Aujourd'hui</option>
                <option value="tomorrow">Demain</option>
                <option value="friday">Vendredi</option>
                <option value="later">Plus tard</option>
            </select>
            <div class="btns">
                <button class="btn-secondary" id="close-modal">Annuler</button>
                <button class="btn-primary" id="save-task">Ajouter</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="../_shared/portfolio-bar.js" defer></script>
</body>
</html>
